name: Build release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: copilot-proxy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
          cache: 'true'
      - name: Run tests
        run: go test ./...
      - name: Build and package binaries
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME}
          DIST=dist
          BUILD=build
          configs=(
            "linux amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )
          mkdir -p "$DIST" "$BUILD"
          for config in "${configs[@]}"; do
            read -r goos goarch archive <<<"$config"
            binname="${BINARY_NAME}-${goos}-${goarch}"
            outfile="$BUILD/$binname"
            [ "$goos" = "windows" ] && outfile="${outfile}.exe"
            env GOOS="$goos" GOARCH="$goarch" go build -o "$outfile" ./cmd/copilot-proxy
            artifact="$DIST/${binname}-${VERSION}"
            if [ "$archive" = "zip" ]; then
              artifact="${artifact}.zip"
              zip -j "$artifact" "$outfile"
            else
              artifact="${artifact}.tar.gz"
              tar czf "$artifact" -C "$BUILD" "$(basename "$outfile")"
            fi
          done
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: copilot-proxy ${{ github.ref_name }}
          body: |
            Automated release generated by GitHub Actions for ${{ github.ref_name }} (commit ${{ github.sha }}).
          files: |
            dist/*.tar.gz
            dist/*.zip
